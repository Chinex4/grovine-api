name: Deploy Laravel API to cPanel

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Install dependencies (vendor)
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_KEY }}

      - name: Trust host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.CPANEL_PORT }} ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts

      - name: Validate DEPLOY_PATH
        run: |
          test -n "${{ secrets.DEPLOY_PATH }}" || (echo "DEPLOY_PATH secret is missing" && exit 1)

      - name: Upload code (tar over SSH)
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=6 \
            -p ${{ secrets.CPANEL_PORT }} \
            ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }} \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}'"

          tar --exclude=".git" \
              --exclude=".github" \
              --exclude="node_modules" \
              --exclude=".env" \
              -czf - . | \
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=6 \
            -p ${{ secrets.CPANEL_PORT }} \
            ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }} \
            "tar -xzf - -C '${{ secrets.DEPLOY_PATH }}'"

      - name: Run Laravel commands on server
        run: |
          ssh -p ${{ secrets.CPANEL_PORT }} ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }} "
          set -e

          APP_PATH='${{ secrets.DEPLOY_PATH }}'
          LIVE_PUBLIC='/home2/grovinen/public_html/api.grovine.ng/public'

          cd \"$APP_PATH\"

          chmod -R 775 storage bootstrap/cache || true

          php artisan config:clear || true
          php artisan route:clear || true
          php artisan view:clear || true
          php artisan cache:clear || true

          php artisan migrate --force || true

          mkdir -p \"$LIVE_PUBLIC\"

          rsync -av --delete public/ \"$LIVE_PUBLIC\"/

          cat > \"$LIVE_PUBLIC/index.php\" <<'PHP'
          <?php

          use Illuminate\Foundation\Application;
          use Illuminate\Http\Request;

          define('LARAVEL_START', microtime(true));

          if (file_exists(\$maintenance = __DIR__.'/../../../../apps/grovine-api/storage/framework/maintenance.php')) {
              require \$maintenance;
          }

          require __DIR__.'/../../../../apps/grovine-api/vendor/autoload.php';

          \$app = require_once __DIR__.'/../../../../apps/grovine-api/bootstrap/app.php';

          \$app->handleRequest(Request::capture());
          PHP

          rm -f \"$LIVE_PUBLIC/storage\"
          ln -sfn \"$APP_PATH/storage/app/public\" \"$LIVE_PUBLIC/storage\"

          php artisan config:cache || true
          php artisan route:cache || true
          "
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
